    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script>
      // A small Markdown-driven manual: the structure lives in docs/manifest.json
      // and every page is a Markdown file under docs/<category>/<page>.md. This
      // shell renders the sidebar, routes by URL hash (#category/page), and
      // renders the selected page — so the docs are authored purely in Markdown.
      (async () => {
        const article = document.querySelector("[data-doc]");
        const navEl = document.querySelector("[data-nav]");
        const pagerEl = document.querySelector("[data-pager]");

        const fail = (message) => {
          article.innerHTML =
            '<p class="doc-status">' +
            message +
            ' Read the source on <a href="https://github.com/lumine-code/lumine-code.github.io/tree/main/docs">GitHub</a>.</p>';
        };

        let manifest;
        try {
          if (!window.marked) throw new Error("renderer");
          manifest = await (await fetch("docs/manifest.json")).json();
        } catch (error) {
          console.error(error);
          return fail("Could not load the documentation.");
        }

        // Flatten the page list so we can resolve routes and prev/next links.
        const flat = [];
        for (const category of manifest.categories) {
          for (const page of category.pages) {
            flat.push({
              category: category.slug,
              categoryTitle: category.title,
              slug: page.slug,
              title: page.title,
              route: category.slug + "/" + page.slug,
              file: "docs/" + category.slug + "/" + page.slug + ".md",
            });
          }
        }
        const byRoute = new Map(flat.map((p) => [p.route, p]));

        // Build the sidebar: a collapsible group per category, a link per page.
        for (const category of manifest.categories) {
          const group = document.createElement("div");
          group.className = "nav-group";
          group.dataset.category = category.slug;
          const heading = document.createElement("button");
          heading.type = "button";
          heading.className = "nav-group-title";
          heading.textContent = category.title;
          const list = document.createElement("ul");
          list.className = "nav-pages";
          for (const page of category.pages) {
            const li = document.createElement("li");
            const link = document.createElement("a");
            link.href = "#" + category.slug + "/" + page.slug;
            link.textContent = page.title;
            link.dataset.route = category.slug + "/" + page.slug;
            li.appendChild(link);
            list.appendChild(li);
          }
          heading.addEventListener("click", () =>
            group.classList.toggle("open"),
          );
          group.appendChild(heading);
          group.appendChild(list);
          navEl.appendChild(group);
        }

        const currentRoute = () =>
          location.hash.replace(/^#\/?/, "").split("#")[0];

        const pager = (page) => {
          const index = flat.indexOf(page);
          pagerEl.innerHTML = "";
          const link = (target, rel, label) => {
            const a = document.createElement("a");
            a.className = "doc-pager-link doc-pager-" + rel;
            a.href = "#" + target.route;
            a.innerHTML =
              '<span class="doc-pager-rel">' +
              (rel === "prev" ? "Previous" : "Next") +
              '</span><span class="doc-pager-title">' +
              label +
              "</span>";
            pagerEl.appendChild(a);
          };
          if (index > 0) link(flat[index - 1], "prev", flat[index - 1].title);
          if (index > -1 && index < flat.length - 1)
            link(flat[index + 1], "next", flat[index + 1].title);
        };

        const render = async () => {
          const route = currentRoute();
          const page = byRoute.get(route) || flat[0];
          if (!byRoute.get(route)) {
            location.replace("#" + flat[0].route);
          }

          article.innerHTML = '<p class="doc-status">Loading&hellip;</p>';
          let markdown;
          try {
            const response = await fetch(page.file);
            if (!response.ok)
              throw new Error(page.file + " (" + response.status + ")");
            markdown = await response.text();
          } catch (error) {
            console.error(error);
            return fail("Could not load this page.");
          }

          article.innerHTML = window.marked.parse(markdown, { gfm: true });

          // Rewrite in-manual Markdown links (e.g. "../using-lumine/basics.md")
          // to hash routes so navigation stays inside the single-page shell.
          article.querySelectorAll("a[href]").forEach((link) => {
            const href = link.getAttribute("href");
            const match = href.match(/(?:^|\/)([\w-]+)\/([\w-]+)\.md(#.+)?$/);
            if (match) {
              link.setAttribute(
                "href",
                "#" + match[1] + "/" + match[2] + (match[3] || ""),
              );
              return;
            }
            const same = href.match(/^([\w-]+)\.md(#.+)?$/);
            if (same)
              link.setAttribute(
                "href",
                "#" + page.category + "/" + same[1] + (same[2] || ""),
              );
          });

          // Highlight the active page and open its category.
          navEl.querySelectorAll("a[data-route]").forEach((link) => {
            const on = link.dataset.route === page.route;
            link.classList.toggle("active", on);
            if (on) link.closest(".nav-group").classList.add("open");
          });

          pager(page);
          document.title = page.title + " — Lumine Documentation";
          window.scrollTo(0, 0);
        };

        window.addEventListener("hashchange", render);
        await render();
      })();
    </script>
  </body>
</html>
